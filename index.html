<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invite Maker</title>
    <link rel="stylesheet" href="styles/index.css">

    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Leckerli+One&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    
</head>
<body>

    <div id="app">
        <aside>
            <div id="title">
                <img src="assets/Logo.svg" alt="Símbolo de confetes coloridos">
                <h1>Festivite</h1>
                <p>Crie um convite digital para o seu evento</p>
            </div>
        </aside>
        <main>
            <header>
                <h1>Crie seu convite</h1>
            </header>

            <div id="forms">
                <section id="about">
                    <header>
                        <img src="assets/calendar.svg" alt="">
                        <p>Sobre o evento</p>
                    </header>

                    <div class="textinput">
                        <label for="event-title">Título</label>
                        <input type="text" name="event-title" id="event-title" placeholder="Nome do evento" required>
                    </div>

                    <div class="textinput">
                        <label for="beggining">Início</label>
                        <input type="date" name="beggining" id="beggining" placeholder="DD/MM/AAAA, --:--" required>
                    </div>

                    <div class="textinput">
                        <label for="ending">Fim</label>
                        <input type="date" name="ending" id="ending" placeholder="DD/MM/AAAA, --:--" required>
                    </div>

                    
                </section>


                <section id="personalization">

                </section>


                <section id="contact-info">

                </section>


                <footer>

                </footer>
            </div>

        </main>
    </div>

</body>
</html>
