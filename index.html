<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invite Maker</title>
    <link rel="stylesheet" href="styles/index.css">

    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Leckerli+One&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    
</head>
<body>

    <div id="app">
        <aside>
            <div id="title">
                <img src="assets/Logo.svg" alt="Símbolo de confetes coloridos">
                <h1>Festivite</h1>
                <p>Crie um convite digital para o seu evento</p>
            </div>
        </aside>
        <main>
            <header>
                <h1>Crie seu convite</h1>
            </header>

            <form>
                <section id="about">
                    <header>
                        <img src="assets/calendar.svg" alt="">
                        <p>Sobre o evento</p>
                    </header>

                    <div class="grid">
                        <div class="textinput">
                            <label for="event-title">Título</label>
                            <input type="text" name="event-title" id="event-title" placeholder="Nome do evento" required>
                        </div>

                        <div class="textinput">
                            <label for="beggining">Início</label>
                            <input type="date" name="beggining" id="beggining" required>
                        </div>

                        <div class="textinput">
                            <label for="ending">Fim</label>
                            <input type="date" name="ending" id="ending" required>
                        </div>

                        <div class="textinput">
                            <label for="type">Tipo</label>
                            
                            <div id="tipo">
                                <label class="type-option" for="presencial">
                                    <input type="radio" name="type" value="presencial" id="presencial">
                                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path fill-rule="evenodd" clip-rule="evenodd" d="M5.33325 1.8335C5.11224 1.8335 4.90028 1.92129 4.744 2.07757C4.58772 2.23385 4.49992 2.44582 4.49992 2.66683V14.1668H11.4999V2.66683C11.4999 2.44582 11.4121 2.23385 11.2558 2.07757C11.0996 1.92129 10.8876 1.8335 10.6666 1.8335H5.33325ZM12.4999 5.50016V2.66683C12.4999 2.1806 12.3068 1.71428 11.9629 1.37047C11.6191 1.02665 11.1528 0.833496 10.6666 0.833496H5.33325C4.84702 0.833496 4.38071 1.02665 4.03689 1.37047C3.69307 1.71428 3.49992 2.1806 3.49992 2.66683V7.50016H2.66659C2.18035 7.50016 1.71404 7.69332 1.37022 8.03713C1.02641 8.38095 0.833252 8.84727 0.833252 9.3335V13.3335C0.833252 13.8197 1.02641 14.286 1.37022 14.6299C1.71404 14.9737 2.18035 15.1668 2.66659 15.1668H13.3333C13.8195 15.1668 14.2858 14.9737 14.6296 14.6299C14.9734 14.286 15.1666 13.8197 15.1666 13.3335V7.3335C15.1666 6.84726 14.9734 6.38095 14.6296 6.03713C14.2858 5.69332 13.8195 5.50016 13.3333 5.50016H12.4999ZM12.4999 6.50016V14.1668H13.3333C13.5543 14.1668 13.7662 14.079 13.9225 13.9228C14.0788 13.7665 14.1666 13.5545 14.1666 13.3335V7.3335C14.1666 7.11248 14.0788 6.90052 13.9225 6.74424C13.7662 6.58796 13.5543 6.50016 13.3333 6.50016H12.4999ZM3.49992 8.50016H2.66659C2.44557 8.50016 2.23361 8.58796 2.07733 8.74424C1.92105 8.90052 1.83325 9.11248 1.83325 9.3335V13.3335C1.83325 13.5545 1.92105 13.7665 2.07733 13.9228C2.23361 14.079 2.44557 14.1668 2.66659 14.1668H3.49992V8.50016ZM6.16658 4.00016C6.16658 3.72402 6.39044 3.50016 6.66658 3.50016H9.33325C9.60939 3.50016 9.83325 3.72402 9.83325 4.00016C9.83325 4.2763 9.60939 4.50016 9.33325 4.50016H6.66658C6.39044 4.50016 6.16658 4.2763 6.16658 4.00016ZM6.16658 6.66683C6.16658 6.39069 6.39044 6.16683 6.66658 6.16683H9.33325C9.60939 6.16683 9.83325 6.39069 9.83325 6.66683C9.83325 6.94297 9.60939 7.16683 9.33325 7.16683H6.66658C6.39044 7.16683 6.16658 6.94297 6.16658 6.66683ZM6.16658 9.3335C6.16658 9.05735 6.39044 8.8335 6.66658 8.8335H9.33325C9.60939 8.8335 9.83325 9.05735 9.83325 9.3335C9.83325 9.60964 9.60939 9.8335 9.33325 9.8335H6.66658C6.39044 9.8335 6.16658 9.60964 6.16658 9.3335ZM6.16658 12.0002C6.16658 11.724 6.39044 11.5002 6.66658 11.5002H9.33325C9.60939 11.5002 9.83325 11.724 9.83325 12.0002C9.83325 12.2763 9.60939 12.5002 9.33325 12.5002H6.66658C6.39044 12.5002 6.16658 12.2763 6.16658 12.0002Z" fill="#869198"/>
                                    </svg>
                                    <p>Presencial</p>
                                </label>
        
                                <label class="type-option" for="online">
                                    <input type="radio" name="type" value="Online" id="online">
                                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path fill-rule="evenodd" clip-rule="evenodd" d="M2.66659 4.5C2.20635 4.5 1.83325 4.8731 1.83325 5.33333V10.6667C1.83325 11.1269 2.20635 11.5 2.66659 11.5H9.33325C9.79349 11.5 10.1666 11.1269 10.1666 10.6667V8.6735C10.1665 8.66864 10.1665 8.66378 10.1666 8.65892V7.00949C10.1665 7.00347 10.1665 6.99746 10.1666 6.99145V5.33333C10.1666 4.8731 9.79349 4.5 9.33325 4.5H2.66659ZM11.1666 6.12939V5.33333C11.1666 4.32081 10.3458 3.5 9.33325 3.5H2.66659C1.65406 3.5 0.833252 4.32081 0.833252 5.33333V10.6667C0.833252 11.6792 1.65406 12.5 2.66659 12.5H9.33325C10.3458 12.5 11.1666 11.6792 11.1666 10.6667V9.60093L13.8716 11.4043C13.9971 11.4878 14.1429 11.5357 14.2934 11.5429C14.444 11.5501 14.5937 11.5163 14.7266 11.4452C14.8595 11.374 14.9706 11.2682 15.0481 11.1389C15.1255 11.0096 15.1665 10.8617 15.1666 10.7109V5.24681C15.1666 5.24677 15.1666 5.24686 15.1666 5.24681C15.1666 5.10024 15.128 4.9561 15.0545 4.82923C14.9811 4.70231 14.8755 4.59702 14.7484 4.52398C14.6212 4.45094 14.477 4.41274 14.3304 4.41324C14.1838 4.41374 14.0399 4.45291 13.9133 4.52681L11.1666 6.12939ZM11.1666 7.28715V8.39908L14.1666 10.3991V5.53677L11.1666 7.28715Z" fill="#869198"/>
                                    </svg>
                                    <p>Online</p>
                                </label>
                            </div>
                        </div>

                        <div class="textinput">
                            <label for="local">Local</label>
                            <input type="text" name="local" id="local" placeholder="Link ou endereço" required>
                        </div>

                        <div class="textinput">
                            <label for="description">Descrição</label>
                            <textarea name="description" id="description" placeholder="Escreva sobre os detalhes do evento"></textarea>
                        </div>
                    </div>

                    
                </section>


                <section id="personalization">
                    <header>
                        <img src="assets/paintbrush-vertical.png" alt="Símbolo de pincel">
                        <p>Personalização</p>
                    </header>

                    <div id="colors">
                        <label for="color">Cor principal</label>

                        <label class="color-option" for="blue">
                            <input type="radio" name="color" value="blue" id="blue">
                            <img src="assets/blue.png" alt="Azul">
                        </label>

                        <label class="color-option" for="navy">
                            <input type="radio" name="color" value="navy" id="navy">
                            <img src="assets/navy.png" alt="navy">
                        </label>

                        <label class="color-option" for="purple">
                            <input type="radio" name="color" value="purple" id="purple">
                            <img src="assets/purple.png" alt="roxo">
                        </label>

                        <label class="color-option" for="fuschia">
                            <input type="radio" name="color" value="fuschia" id="fuschia">
                            <img src="assets/fuschia.png" alt="Fuschia">
                        </label>

                        <label class="color-option" for="pink">
                            <input type="radio" name="color" value="pink" id="pink">
                            <img src="assets/pink.png" alt="rosa">
                        </label>

                        <label class="color-option" for="red">
                            <input type="radio" name="color" value="red" id="red">
                            <img src="assets/red.png" alt="vermelho">
                        </label>

                        <label class="color-option" for="orange">
                            <input type="radio" name="color" value="orange" id="orange">
                            <img src="assets/orange.png" alt="laranja">
                        </label>

                        <label class="color-option" for="yellow">
                            <input type="radio" name="color" value="yellow" id="yellow">
                            <img src="assets/yellow.png" alt="amarelo">
                        </label>

                        <label class="color-option" for="lime">
                            <input type="radio" name="color" value="lime" id="lime">
                            <img src="assets/lime.png" alt="lima">
                        </label>

                        <label class="color-option" for="green">
                            <input type="radio" name="color" value="green" id="green">
                            <img src="assets/green.png" alt="verde">
                        </label>

                        <label class="color-option" for="cyan">
                            <input type="radio" name="color" value="cyan" id="cyan">
                            <img src="assets/cyan.png" alt="ciano">
                        </label>
                        
                    </div>

                    <div id="theme">
                        <label for="tema">Tema do evento</label>

                        <label class="card" for="aniversário">
                            <input type="radio" name="tema" value="aniversário" id="aniversário">
                            <img src="assets/aniversario.png" alt="Aniversário">
                            <p>Aniversário</p>
                        </label>

                        <label class="card" for="infantil">
                            <input type="radio" name="tema" value="infantil" id="infantil">
                            <img src="assets/infantil.png" alt="infantil">
                            <p>Infantil</p>
                        </label>

                        <label class="card" for="formatura">
                            <input type="radio" name="tema" value="formatura" id="formatura">
                            <img src="assets/formatura.png" alt="formatura">
                            <p>Formatura</p>
                        </label>

                        <label class="card" for="casamento">
                            <input type="radio" name="tema" value="casamento" id="casamento">
                            <img src="assets/casamento.png" alt="casamento">
                            <p>Casamento</p>
                        </label>

                        <label class="card" for="chá-de-bebê">
                            <input type="radio" name="tema" value="chá-de-bebê" id="chá-de-bebê">
                            <img src="assets/bebe.png" alt="chá-de-bebê">
                            <p>Chá de Bebê</p>
                        </label>

                        <label class="card" for="chá-de-panela">
                            <input type="radio" name="tema" value="chá-de-panela" id="chá-de-panela">
                            <img src="assets/panela.png" alt="chá-de-panela">
                            <p>Chá de Panela</p>
                        </label>

                        <label class="card" for="carnaval">
                            <input type="radio" name="tema" value="carnaval" id="carnaval">
                            <img src="assets/carnaval.png" alt="carnaval">
                            <p>Carnaval</p>
                        </label>

                        <label class="card" for="pascoa">
                            <input type="radio" name="tema" value="pascoa" id="pascoa">
                            <img src="assets/pascoa.png" alt="pascoa">
                            <p>Páscoa</p>
                        </label>

                        <label class="card" for="são-joão">
                            <input type="radio" name="tema" value="são-joão" id="são-joão">
                            <img src="assets/joao.png" alt="são-joão">
                            <p>São João</p>
                        </label>

                        <label class="card" for="halloween">
                            <input type="radio" name="tema" value="halloween" id="halloween">
                            <img src="assets/halloween.png" alt="halloween">
                            <p>Halloween</p>
                        </label>

                        <label class="card" for="natal">
                            <input type="radio" name="tema" value="natal" id="natal">
                            <img src="assets/natal.png" alt="natal">
                            <p>Natal</p>
                        </label>

                        <label class="card" for="outro">
                            <input type="radio" name="tema" value="outro" id="outro">
                            <img src="assets/outro.png" alt="outro">
                            <p>Outro</p>
                        </label>
                    </div>

                    <div id="style">
                        <label for="estilo">Estilo
                            <input type="checkbox" name="estilo" value="claro" id="claro">
                            <p>Claro</p>
                        </label>
                    </div>

                    <div id="file">
                        <label for="arquivo">Foto de capa</label>
                        <label for="upload">
                            <input type="file" name="arquivo" id="upload">
                            <img src="assets/upload.png" alt="Icone de upload">
                            <p>selecionar</p>
                        </label>
                    </div>
                </section>


                <section id="contact-info">
                    <header>
                        <img src="assets/contact.png" alt="Icone de contato">
                        <p>Dados para contato</p>
                    </header>

                    <div class="textinput">
                        <label for="name">Nome</label>
                        <input type="text" name="name" id="name" placeholder="Nome completo" required>
                    </div>
                    <div class="textinput">
                        <label for="email">E-mail</label>
                        <input type="email" name="email" id="email" placeholder="exemplo@email.com" required>
                    </div>
                    <div class="textinput">
                        <label for="phone">Telefone</label>
                        <input type="tel" name="phone" id="phone" placeholder="(99) 99999-9999" required>
                    </div>
                </section>


                <footer>
                    <label for="terms">
                        <input type="checkbox" name="terms" id="terms" required>
                        Li e concordo com os <span>Termos e Condições</span> e com a <span>Política de Privacidade</span>
                    </label>
                    <label for="email-notf">
                        <input type="checkbox" name="email-notf" id="email-notf">
                        Aceito receber atualizações e promoções por e-mail
                    </label>
                    <label for="sms-notf">
                        <input type="checkbox" name="sms-notf" id="sms-notf">
                        Aceito receber atualizações e promoções por SMS
                    </label>

                    <button type="submit">
                        <img src="assets/ticket.png" alt="Icone de ticket">
                        <p>Gerar convite</p>
                    </button>
                </footer>
            </form>

        </main>
    </div>

</body>
</html>
